image: rocker/r-ver:4

pipelines:
  branches:
    main:
      - step:
          name: Test and Deploy R Shiny Application
          caches:
            - r-packages
          script:
            # Update system packages
            - apt-get update
            - apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev
            
            # Install system dependencies for shinytest
            - apt-get install -y wget gnupg
            - wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | apt-key add -
            - sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
            - apt-get update
            - apt-get install -y google-chrome-stable
            
            # Install R packages
            - Rscript -e "install.packages(c('shiny', 'DT', 'testthat', 'shinytest2'), repos='https://cran.rstudio.com/')"
            
            # Run tests
            - Rscript -e "setwd('tests'); testthat::test_dir('.')"
            
            # Deploy steps would go here
            - echo "All tests passed! Ready for deployment."
          artifacts:
            - tests/shinytest2/**
            - tests/testthat.log

  pull-requests:
    '**':
      - step:
          name: Test R Shiny Application (PR)
          caches:
            - r-packages
          script:
            # Update system packages
            - apt-get update
            - apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev
            
            # Install system dependencies for shinytest
            - apt-get install -y wget gnupg
            - wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | apt-key add -
            - sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
            - apt-get update
            - apt-get install -y google-chrome-stable
            
            # Install R packages
            - Rscript -e "install.packages(c('shiny', 'DT', 'testthat', 'shinytest2'), repos='https://cran.rstudio.com/')"
            
            # Run tests
            - Rscript -e "setwd('tests'); testthat::test_dir('.')"
          artifacts:
            - tests/shinytest2/**
            - tests/testthat.log

definitions:
  caches:
    r-packages: /usr/local/lib/R/site-library